<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jsvm Browser Imports Example</title>
  <style>
    body {
      font-family: monospace;
      margin: 20px;
      background: #f5f5f5;
    }
    #output {
      background: white;
      padding: 15px;
      border-radius: 4px;
      border: 1px solid #ddd;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <h1>jsvm Browser Imports Example</h1>
  <button onclick="runExample()">Run Example</button>
  <div id="output">Output will appear here...</div>

  <script type="module">
    import { run } from '../main.js';
    import { createBrowserImportResolver } from '../src/platform/browser.js';

    // Make runExample globally available
    window.runExample = async function() {
      const output = document.getElementById('output');
      output.textContent = 'Loading modules...';

      try {
        // Create a resolver with pre-loaded modules
        const resolver = createBrowserImportResolver({
          baseURL: window.location.href,
          cache: true,
          globalModules: {
            // Pre-define some modules directly
            [new URL('config.json', window.location.href).href]: {
              apiUrl: 'https://api.example.com',
              timeout: 5000,
              environment: 'browser'
            },
            [new URL('utils.js', window.location.href).href]: {
              greet: (name) => `Hello, ${name}!`,
              toUpperCase: (str) => str.toUpperCase()
            }
          }
        });

        // Example jsvm program
        const program = `
import { apiUrl, timeout, environment } from 'config';
import { greet, toUpperCase } from 'utils';

print('Browser Environment Example:');
print('API URL: ' + apiUrl);
print('Timeout: ' + timeout + 'ms');
print('Environment: ' + environment);
print(greet('jsvm'));
print(toUpperCase('running in browser'));
        `;

        output.textContent = 'Running jsvm program...\n';

        // Run with synchronous module access (using pre-loaded modules)
        run(program, {
          onPrint: (msg) => {
            output.textContent += msg + '\n';
          },
          requestImport: (path, specs) => {
            // Use sync access since we pre-loaded modules
            return resolver.requestImportSync(path, specs);
          }
        });

        output.textContent += '\n✓ Program completed successfully';
      } catch (err) {
        output.textContent = `Error: ${err.message}`;
        console.error(err);
      }
    };
  </script>
</body>
</html>
